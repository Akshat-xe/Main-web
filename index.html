<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="0;url=everstart.html">
    <link rel="canonical" href="everstart.html">
    <title>EVERSTAR</title>
    <style>
        html,
        body {
            min-height: 100%;
            margin: 0
        }

        body {
            display: grid;
            place-items: center;
            background: #04070d;
            color: #e8eef7;
            font-family: system-ui, -apple-system, sans-serif;
            background-image: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(125, 211, 252, .12), transparent), radial-gradient(ellipse 60% 50% at 100% 50%, rgba(167, 139, 250, .08), transparent)
        }

        a {
            color: #7dd3fc;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid rgba(125, 211, 252, .4);
            padding-bottom: 2px;
            transition: color .2s, border-color .2s
        }

        a:hover {
            color: #bae6fd;
            border-bottom-color: #bae6fd
        }

        .w {
            text-align: center;
            padding: 2rem;
            max-width: 28rem
        }

        .mark {
            font-size: .75rem;
            letter-spacing: .28em;
            text-transform: uppercase;
            opacity: .55;
            margin-bottom: 1rem
        }
    </style>
</head>

<body>
    <div class="w">
        <p class="mark">Redirect</p>
        <p><a href="everstart.html">Open EVERSTAR</a></p>
    </div>
</body>

</html>
