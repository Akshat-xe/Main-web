<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
        }
        h1 {
            color: #333;
            margin: 0 0 1rem 0;
        }
        p {
            color: #666;
            margin: 0.5rem 0;
            font-size: 1.1rem;
        }
        .success {
            color: #22c55e;
            font-weight: bold;
        }
        a {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.75rem 2rem;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        a:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Server is Running!</h1>
        <p class="success">✓ Your local server is working correctly</p>
        <p>The EVERSTAR website server is active at <strong>localhost:8080</strong></p>
        <p style="font-size: 0.95rem; color: #999; margin-top: 2rem;">
            Note: The main site requires Framer CDN modules. The full site will load once all dependencies are available.
        </p>
        <a href="/">← Back to Home</a>
    </div>
</body>
</html>
